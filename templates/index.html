<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustChain - Secure Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1321;
            --card-bg: #1e2638;
            --input-bg: #2a3449;
            --primary-blue: #2563eb;
            --primary-green: #10b981;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: radial-gradient(circle at top left, #1a233a, var(--bg-dark));
        }

        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-dark);
        }

        .logo { font-size: 24px; font-weight: 700; margin-bottom: auto; }
        h1 { font-size: 56px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .highlight-green { color: var(--primary-green); }
        .subtitle { font-size: 18px; color: var(--text-muted); margin-bottom: 40px; }

        .login-card {
            background-color: var(--card-bg);
            padding: 50px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); }

        .input-group input {
            width: 100%;
            padding: 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="logo">🛡️ TrustChain</div>
        <h1>Secure Digital <br><span class="highlight-green">Certificate<br>Verification</span></h1>
        <p class="subtitle">Join thousands of universities using cryptographic verification for instant, tamper-proof credential validation.</p>
    </div>

    <div class="right-panel">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Sign in to access the Issuer Portal</p>

            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="text" name="email" placeholder="admin@brainware.edu" required>
                </div>

                <div class="input-group">
                    <label>Password (Hint: admin123)</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 13px;">
                <a href="/verify" style="color: var(--primary-green); text-decoration: none;">💼 Employer? Click here to Verify</a>
            </p>
        </div>
    </div>

</body>
</html>
